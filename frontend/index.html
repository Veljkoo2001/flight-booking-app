<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervacija Letova - Početna</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigacija -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-airplane"></i> FlightBooking
            </a>
        </div>
    </nav>
    <div class="main-content">
        <!-- Hero sekcija -->
        <div class="hero-section">
            <div class="container">
                <div class="row">
                    <div class="col-md-8 mx-auto">
                        
                        <div class="hero-title text-center text-white mb-5">
                            <h1>Pronađi najbolji let</h1>
                            <p>Pretraži stotine letova i rezerviši najpovoljniji</p>
                        </div>

                        <div class="search-card">

                            <h3 class="text-center mb-4">
                                <i class="bi bi-search"></i> Pretraži letove
                            </h3>

                            <form id="flightSearchForm">
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Glavni sadržaj -->
        <div class="container mt-5">
            <div class="row">
                <div class="col-md-8 mx-auto">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h4 class="mb-0">Pretraži letove</h4>
                        </div>
                        <div class="card-body">
                            <form id="flightSearchForm">
                                <!-- Tip putovanja -->
                                <div class="mb-3">
                                    <label class="form-label">Tip putovanja:</label>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="flightType" id="oneWay" value="one-way" checked>
                                        <label class="form-check-label" for="oneWay">U jednom pravcu</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="flightType" id="return" value="return">
                                        <label class="form-check-label" for="return">Povratna</label>
                                    </div>
                                </div>

                                <div class="row">
                                    <!-- Od -->
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-geo-alt"></i>
                                        </span>
                                        <input type="text" class="form-control" id="fromCity" placeholder="Beograd" required>
                                        <div class="autocomplete-list" id="fromCityList"></div>
                                    </div>
                                    
                                    <!-- Swap dugme -->
                                    <div class="text-center mb-3">
                                        <button type="button" id="swapCities" class="btn btn-light">
                                        <i class="bi bi-arrow-left-right"></i>
                                        </button>
                                    </div>

                                    <!-- Do -->
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-flag"></i>
                                        </span>
                                        <input type="text" class="form-control" id="toCity" placeholder="Tivat" required>
                                        <div class="autocomplete-list" id="fromCityList"></div>
                                    </div>
                                </div>

                                <div class="row">
                                    <!-- Datum polaska -->
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="bi bi-calendar"></i>
                                        </span>
                                        <input type="date" class="form-control" id="departureDate" required>
                                    </div>
                                    
                                    <!-- Datum povratka (sakriven za one-way) -->
                                    <div class="col-md-6 mb-3" id="returnDateGroup" style="display: none;">
                                        <label for="returnDate" class="form-label">Datum povratka:</label>
                                        <input type="date" class="form-control" id="returnDate">
                                    </div>
                                </div>

                                <!-- Prtljag -->
                                <div class="mb-3">
                                    <label class="form-label">Prtljag:</label>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="luggage" id="luggageNo" value="false" checked>
                                        <label class="form-check-label" for="luggageNo">Bez prtljaga</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="luggage" id="luggageYes" value="true">
                                        <label class="form-check-label" for="luggageYes">Sa prtljagom</label>
                                    </div>
                                </div>

                                <!-- Submit dugme -->
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-search"></i> Pretraži letove
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/app.js"></script>
</body>
</html>
