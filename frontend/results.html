<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervacija Letova - Rezultati</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigacija -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-airplane"></i> FlightBooking
            </a>
            <a href="index.html" class="btn btn-light btn-sm">
                <i class="bi bi-arrow-left"></i> Nova pretraga
            </a>
        </div>
    </nav>

    <!-- Glavni sadržaj -->
    <div class="container mt-4">
        <!-- Loading spinner -->
        <div id="loadingSpinner" class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Učitavanje...</span>
            </div>
            <p class="mt-2">Pretražujemo letove...</p>
        </div>

        <!-- Rezultati pretrage -->
        <div id="resultsContainer" style="display: none;">
            <!-- Kriterijumi pretrage -->
            <div class="alert alert-info" id="searchCriteria">
                <!-- Popunjava se JavaScript-om -->
            </div>

            <!-- Tabs za odlazne i povratne letove (za povratna putovanja) -->
            <ul class="nav nav-tabs mb-3" id="flightTabs" role="tablist" style="display: none;">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="outbound-tab" data-bs-toggle="tab" data-bs-target="#outbound" type="button" role="tab">
                        Odlazni letovi
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="return-tab" data-bs-toggle="tab" data-bs-target="#return" type="button" role="tab">
                        Povratni letovi
                    </button>
                </li>
            </ul>

            <!-- Tab content -->
            <div class="tab-content" id="flightTabContent">
                <!-- Odlazni letovi -->
                <div class="tab-pane fade show active" id="outbound" role="tabpanel">
                    <h4>Odlazni letovi</h4>
                    <div id="outboundFlightsList" class="row">
                        <!-- Letovi se dodaju dinamčki -->
                    </div>
                </div>
                
                <!-- Povratni letovi -->
                <div class="tab-pane fade" id="return" role="tabpanel">
                    <h4>Povratni letovi</h4>
                    <div id="returnFlightsList" class="row">
                        <!-- Letovi se dodaju dinamčki -->
                    </div>
                </div>
            </div>

            <!-- Poruka ako nema rezultata -->
            <div id="noResults" class="alert alert-warning text-center" style="display: none;">
                <i class="bi bi-exclamation-triangle"></i>
                Nema letova koji odgovaraju vašoj pretrazi.
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/app.js"></script>
</body>
</html>
